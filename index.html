<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="パーソナルタスク管理ダッシュボード - タスク、プロジェクト、カンバンボードを一元管理">
  <title>K.HoshinoTasks — タスク管理ダッシュボード</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=3">
  <link rel="stylesheet" href="css/views.css?v=3">
  <link rel="stylesheet" href="css/animations.css?v=3">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
</head>
<body>

  <div class="app-layout">
    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </div>
          <span class="sidebar-logo-text">K.HoshinoTasks</span>
        </div>
        <div class="sidebar-toggle" id="sidebar-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </div>
      </div>

      <nav class="sidebar-nav">
        <!-- Main Navigation -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">メニュー</div>
          <div class="sidebar-item active" data-view="dashboard">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
            </span>
            <span class="sidebar-item-text">ダッシュボード</span>
          </div>
          <div class="sidebar-item" data-view="list">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
              </svg>
            </span>
            <span class="sidebar-item-text">タスク一覧</span>
            <span class="sidebar-item-badge" id="badge-today" style="display:none">0</span>
          </div>
          <div class="sidebar-item" data-view="kanban">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/>
              </svg>
            </span>
            <span class="sidebar-item-text">カンバンボード</span>
          </div>
          <div class="sidebar-item" data-view="calendar">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </span>
            <span class="sidebar-item-text">カレンダー</span>
          </div>
          <div class="sidebar-item" data-view="gantt">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
                <path d="M8 6h4M12 12h6M6 18h8" stroke-width="4" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="sidebar-item-text">ガントチャート</span>
          </div>
        </div>

        <!-- Quick Access -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">クイックアクセス</div>
          <div class="sidebar-item" onclick="App.filters = { overdue: true }; App.navigateTo('list')">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            </span>
            <span class="sidebar-item-text">期限超過</span>
            <span class="sidebar-item-badge" id="badge-overdue" style="display:none; background: rgba(244, 63, 94, 0.1); color: #f43f5e;">0</span>
          </div>
          <div class="sidebar-item" onclick="App.filters = { dueSoon: true }; App.navigateTo('list')">
            <span class="sidebar-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </span>
            <span class="sidebar-item-text">締め切り間近</span>
            <span class="sidebar-item-badge" id="badge-due-soon" style="display:none; background: rgba(245, 158, 11, 0.1); color: #f59e0b;">0</span>
          </div>
        </div>

        <!-- Projects -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">プロジェクト</div>
          <div id="sidebar-projects-list">
            <!-- Dynamically rendered -->
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="sidebar-add-project admin-only" id="sidebar-add-project">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          <span>プロジェクトを追加</span>
        </button>
      </div>
    </aside>

    <!-- Mobile Sidebar Overlay -->
    <div class="mobile-sidebar-overlay" id="mobile-sidebar-overlay"></div>

    <!-- ═══ Main Wrapper ═══ -->
    <div class="main-wrapper">
      <!-- Header -->
      <header class="header" id="header">
        <div class="header-left">
          <button class="header-mobile-toggle" id="mobile-menu-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="header-title" id="header-title">ダッシュボード</h1>
        </div>
        <div class="header-center">
          <div class="search-bar">
            <svg class="search-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" class="search-bar-input" id="search-input" placeholder="タスクを検索...">
            <span class="search-bar-shortcut">/</span>
          </div>
        </div>
        <div class="header-right">
          <div id="admin-indicator">
            <!-- Dynamically rendered: login button or admin badge -->
          </div>
          <button class="icon-btn tooltip" id="theme-toggle" data-tooltip="テーマ切替">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
          <button class="btn btn-primary btn-sm admin-only" id="new-task-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>新規タスク</span>
          </button>
        </div>
      </header>

      <!-- Viewer Banner -->
      <div class="viewer-banner" id="viewer-banner" style="display: none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>閲覧モードで表示中 — 編集するにはログインしてください</span>
      </div>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <!-- Content rendered dynamically by views -->
      </main>
    </div>
  </div>

  <!-- ═══ Modal Overlay ═══ -->
  <div class="modal-overlay" id="task-modal-overlay" onclick="if(event.target===this) TaskModal.close()">
    <div class="modal" id="task-modal">
      <!-- Modal content rendered dynamically -->
    </div>
  </div>

  <!-- ═══ Context Menu ═══ -->
  <div class="context-menu" id="context-menu"></div>

  <!-- ═══ Admin Login Modal ═══ -->
  <div class="modal-overlay" id="admin-login-overlay">
    <div class="modal" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title">🔐 管理者ログイン</h2>
        <button class="modal-close" onclick="AdminLogin.hide()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input type="password" id="admin-password-input" class="form-input" placeholder="管理者パスワードを入力...">
        </div>
        <div id="admin-login-error" style="display: none; color: var(--color-danger-500); font-size: var(--text-sm); margin-top: -12px; margin-bottom: 12px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="AdminLogin.hide()">キャンセル</button>
        <button class="btn btn-primary" id="admin-login-submit">ログイン</button>
      </div>
    </div>
  </div>

  <!-- ═══ Toast Container ═══ -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ═══ Scripts (order matters) ═══ -->
  <script src="js/models.js?v=3"></script>
  <script src="js/store.js?v=3"></script>
  <script src="js/components/sidebar.js?v=3"></script>
  <script src="js/components/header.js?v=3"></script>
  <script src="js/components/taskCard.js?v=3"></script>
  <script src="js/components/taskModal.js?v=3"></script>
  <script src="js/components/filterBar.js?v=3"></script>
  <script src="js/views/dashboard.js?v=3"></script>
  <script src="js/views/listView.js?v=3"></script>
  <script src="js/views/kanbanView.js?v=3"></script>
  <script src="js/views/calendarView.js?v=3"></script>
  <script src="js/views/ganttView.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
